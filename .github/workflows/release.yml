name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build Vite renderer
        run: npm run build

      - name: Build Electron main process
        run: npm run electron:build-main

      - name: Decode code signing certificate
        env:
          CERT_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        if: env.CERT_BASE64 != ''
        run: |
          echo "$CERT_BASE64" | base64 --decode > cert.pfx
        shell: bash

      - name: Package with electron-builder
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Jarvis ${{ github.ref_name }} — Production Release"
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            release/*.exe
            release/*.zip
            release/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up certificate
        if: always()
        run: |
          if (Test-Path cert.pfx) { Remove-Item cert.pfx }
        shell: pwsh
